main:
  cleanup: true
  abrt_maxage: 30
  abrt_maxsize: 50 MB
  abrt_directory: /var/log/crash/abrt
  max_filesize: "2 GiB"
  max_fileage: 30
  check_services:
    []
  file_extensions:
    - "tar.gz"
    - ".gz"
    - '.*-\d{8}'
  exclude_patterns:
    - '\.keep$'
    - 'compliance'
  directories_to_check:
    - "/var/log"
  audit_percent: 50
  compressed_age_detection: true
  log_file: diskcleanup.log

files:
  "/var/log/mysqld.log": "5 MiB"
  "/var/log/mysql/mysql-slow.log": {}
  "/var/log/ringcentral/lss/logstash-plain.log": {}
  "/var/log/kibana/kibana.log": {}

journald:
  cleanup: true
  max_size: "500 MB"
  max_age: "30d"

# Daemon mode settings (used with --daemon flag)
# daemon:
#   interval: 3600                              # Seconds between cleanup cycles (default: 3600)
#   pid_file: /var/run/diskcleanup.pid          # PID file path (default: /var/run/diskcleanup.pid)
#   max_consecutive_errors: 5                   # Exit after N consecutive failures (default: 5)

directories:
  "/var/log/haproxy":
    max_fileage: 10
    file_pattern: "haproxy-.*"
  "/var/log/kibana-1":
    max_fileage: 3
    file_pattern: "kibana-.*"
