# 🎨 escmd Theme Configuration
# Define custom themes for the Elasticsearch command-line tool.
# Usage:
#   1. Define your themes in this file
#   2. Set display_theme in elastic_servers.yml to use a theme
#   3. Switch themes with: python3 theme_switcher.py <theme_name>
#
# Theme Structure:
#   - border_style: Universal border color for all panels
#   - header_style: Table header styling
#   - health_styles: Health indicators (green, yellow, red)
#   - status_styles: Status indicators (open, close)
#   - state_styles: Shard states (STARTED, INITIALIZING, etc.)
#   - type_styles: Shard types (primary, replica)
#   - panel_styles: Panel styling (title, success, error, etc.)
#   - help_styles: Help system styling (title, commands, examples, etc.)

themes:
  # 🌈 Rich Theme - Colorful display for dark terminal backgrounds
  rich:
    table_styles:
      border_style: white
      header_style: bold white on dark_blue
      table_box: heavy # Options: heavy, rounded, simple, double, or None for no borders
      health_styles:
        green:
          icon: green bold
          text: green bold
        yellow:
          icon: yellow bold
          text: yellow bold
        red:
          icon: red bold
          text: red bold
      status_styles:
        open:
          icon: blue bold
          text: blue bold
        close:
          icon: red bold
          text: red bold
      state_styles:
        STARTED:
          icon: green bold
          text: green bold
        INITIALIZING:
          icon: yellow bold
          text: yellow bold
        RELOCATING:
          icon: blue bold
          text: blue bold
        UNASSIGNED:
          icon: red bold
          text: red bold
        default:
          icon: bold
          text: bold
      type_styles:
        primary:
          icon: gold1 bold
          text: gold1 bold
        replica:
          icon: cyan bold
          text: cyan bold
      row_styles:
        normal: white
        zebra: grey11
        hot: bright_red
        frozen: bright_blue
        critical_health: red
        warning_health: yellow
        healthy: white
    panel_styles:
      title: bold cyan
      section_header: bold yellow
      command: bold yellow
      description: white
      example: cyan
      footer: dim white
    semantic_styles:
      primary: cyan
      secondary: magenta
      success: green
      warning: yellow
      error: red
      info: blue

