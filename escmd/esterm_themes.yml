# ESterm Theme Configuration
# Separate theme system for ESterm interactive terminal
# This is completely independent from ESCMD's theme system

esterm_themes:
  # Rich theme - colorful and vibrant
  rich:
    banner:
      title_style: "bold bright_blue"
      subtitle_style: "dim cyan"
      version_style: "bright_green"
      welcome_style: "green"
      border_style: "blue"

    prompt:
      connected_cluster_style: "green"
      disconnected_style: "red"
      warning_cluster_style: "yellow"
      prompt_symbol_style: "bold blue"
      prompt_symbol: "➤"

    status:
      title_style: "bold cyan"
      label_style: "bold white"
      value_style: "cyan"
      success_style: "green"
      warning_style: "yellow"
      error_style: "red"
      info_style: "blue"
      border_style: "cyan"

    messages:
      success_style: "green"
      error_style: "red"
      warning_style: "yellow"
      info_style: "blue"
      progress_style: "blue"

    panels:
      title_style: "bold cyan"
      subtitle_style: "dim white"
      border_style: "blue"
      content_style: "white"

    help:
      title_style: "bold cyan"
      section_header_style: "bold yellow"
      command_style: "bold green"
      description_style: "white"
      example_style: "cyan"
      footer_style: "dim white"

  # Plain theme - minimal colors, accessibility focused
